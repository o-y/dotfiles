# =====================================================================
# Style & Typography System
# =====================================================================
[style.font]
bold = true
text_colour = "match_icon"

[style.process_divider]
symbol = "‚Äļ"
colour = "#c3c7d8"

[style.badge_divider]
symbol = "‚Ēā"
colour = "#c3c7d8"

# =====================================================================
# Multi-Pane Indicator
# =====================================================================
[panes]
enabled = true
icon = "ůįĚė"
colour = "match_left"

# =====================================================================
# Custom Directory Rules
# =====================================================================
[[directories.rules]]
path = "/"
icon = "ÔĀĽ"
colour = "#f3f59d"
process_context = true

# When sitting exactly in the home directory (`~`), hide directory context (`~ ‚Äļ cli` becomes just `cli`).
[[directories.rules]]
path = "~"
exact = true
icon = "ÔĀĽ"
colour = "#f3f59d"
process_context = false

[[directories.rules]]
path = "/google/src/cloud/"
icon = "Óüį"
colour = "#ea999c"
display_name_pattern = "^/google/src/cloud/[^/]+/([^/]+)/[^/]+$"
process_context = true

